name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --noconsole --name "PC98_Game_Linker" main.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
